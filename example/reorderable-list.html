<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>ReorderableList</title>
	<link rel="stylesheet" href="../nue.css">
	<style>
	</style>
	<script type="module">
		import * as nue from '../nue.js'

		class Root extends nue.Root {
			constructor () {
				super('div', { id: 'root' })
				let item

				this.list = new nue.ReorderableList()
				
				item = new nue.Span()
				item.setText('aaa')
				this.list.addItem(item)

				item = new nue.Span()
				item.setText('bbb')
				this.list.addItem(item)

				item = new nue.Span()
				item.setText('ccc')
				this.list.addItem(item)

				item = new nue.Span()
				item.setText('ddd')
				this.list.addItem(item)

				this.add(this.list)
			}
		}

		document.addEventListener('DOMContentLoaded', () => {
			let root = new Root()
			root.mount('#app')
		})
	</script>
</head>
<body>
	<div id="app"></div>
</body>
</html>
