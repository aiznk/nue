<!DOCTYPE html>
<html lang="ja">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" href="../nue.css">
	<title>Picture Frame</title>
	<style>
		/* 全体の額縁 */
		.nue_picture-frame {
			position: relative;
			display: inline-flex;
			flex-direction: column;
			align-items: center;

			padding: 22px;
			border-radius: 6px;

			/* 木製＋金属っぽい多重フレーム */
			background:
				linear-gradient(145deg,
					#3d2b1f 0%,
					#6e4d34 12%,
					#2b1b11 24%,
					#a67c52 38%,
					#2f2118 52%,
					#8c6843 68%,
					#2b1b11 100%);

			box-shadow:
				0 0 0 2px rgba(255,255,255,0.08),
				0 0 0 6px #1b120c,
				0 0 0 8px #8a6a47,
				0 10px 40px rgba(0,0,0,0.5),
				inset 0 0 12px rgba(255,255,255,0.08),
				inset 0 0 20px rgba(0,0,0,0.6);

			overflow: hidden;

			/* 古い美術館感 */
			transform: rotate(-0.4deg);
		}

		/* 額縁の装飾ライン */
		.nue_picture-frame::before {
			content: "";
			position: absolute;
			inset: 10px;

			border: 1px solid rgba(255, 220, 160, 0.35);

			box-shadow:
				inset 0 0 10px rgba(255,255,255,0.06),
				0 0 8px rgba(255,200,120,0.08);

			pointer-events: none;
		}

		/* 光沢 */
		.nue_picture-frame::after {
			content: "";
			position: absolute;
			top: -30%;
			left: -20%;

			width: 60%;
			height: 180%;

			background: linear-gradient(
				90deg,
				rgba(255,255,255,0) 0%,
				rgba(255,255,255,0.08) 50%,
				rgba(255,255,255,0) 100%
			);

			transform: rotate(18deg);

			pointer-events: none;
		}

		/* 画像 */
		.nue_picture-frame__image {
			display: block;

			max-width: 300px;
			max-height: 300px;
			cursor: pointer;
			height: auto;

			border: 10px solid #151515;

			background: #000;

			box-shadow:
				0 0 0 1px rgba(255,255,255,0.05),
				0 8px 24px rgba(0,0,0,0.6),
				inset 0 0 12px rgba(255,255,255,0.04);

			filter:
				contrast(1.03)
				saturate(0.92)
				brightness(0.98);
		}

		/* タイトルプレート */
		.nue_picture-frame__title {
			margin-top: 16px;
			padding: 6px 16px;

			font-size: 13px;
			letter-spacing: 0.08em;
			font-family: "Times New Roman", serif;

			color: #e7d7b7;

			background:
				linear-gradient(
					180deg,
					#4b3927 0%,
					#2b2017 100%
				);

			border: 1px solid rgba(255,220,160,0.25);
			border-radius: 999px;

			box-shadow:
				inset 0 1px 2px rgba(255,255,255,0.08),
				0 2px 8px rgba(0,0,0,0.4);

			text-shadow:
				0 1px 2px rgba(0,0,0,0.8);
		}

		/* ホバー演出 */
		.nue_picture-frame:hover {
			transform: rotate(0deg) scale(1.01);

			box-shadow:
				0 0 0 2px rgba(255,255,255,0.08),
				0 0 0 6px #1b120c,
				0 0 0 8px #b48a5f,
				0 18px 48px rgba(0,0,0,0.65),
				inset 0 0 16px rgba(255,255,255,0.1),
				inset 0 0 24px rgba(0,0,0,0.7);

			transition:
				transform 0.25s ease,
				box-shadow 0.25s ease;
		}

		/* 背景オーバーレイ */
		.nue_popup {
			position: fixed;
			inset: 0;
			z-index: 9999;

			display: flex;
			align-items: center;
			justify-content: center;

			padding: 40px;

			background:
				radial-gradient(
					circle at center,
					rgba(30, 30, 30, 0.55) 0%,
					rgba(0, 0, 0, 0.82) 100%
				);

			backdrop-filter: blur(10px);

			animation: nue_popup_fadein 0.25s ease;
			cursor: pointer;
		}

		/* ポップアップ画像 */
		.nue_popup img {
			display: block;

			max-width: min(92vw, 1400px);
			max-height: 90vh;

			object-fit: contain;

			border-radius: 8px;

			/* アート展示っぽい影 */
			box-shadow:
				0 0 0 2px rgba(255,255,255,0.08),
				0 12px 40px rgba(0,0,0,0.65),
				0 0 80px rgba(255,255,255,0.08);

			background: #111;

			transform: scale(0.96);
			animation: nue_popup_image_in 0.28s ease forwards;

			cursor: default;
		}

		/* 画像周囲の光 */
		.nue_popup::before {
			content: "";

			position: absolute;
			width: 60vw;
			height: 60vw;

			background:
				radial-gradient(
					circle,
					rgba(255,255,255,0.08) 0%,
					rgba(255,255,255,0) 70%
				);

			pointer-events: none;
		}

		/* 閉じるヒント */
		.nue_popup::after {
			content: "click to close";

			position: absolute;
			bottom: 24px;
			left: 50%;

			transform: translateX(-50%);

			font-size: 12px;
			letter-spacing: 0.18em;
			text-transform: uppercase;

			color: rgba(255,255,255,0.55);

			font-family: sans-serif;
		}

		/* 背景フェード */
		@keyframes nue_popup_fadein {
			from {
				opacity: 0;
			}

			to {
				opacity: 1;
			}
		}

		/* 画像拡大 */
		@keyframes nue_popup_image_in {
			from {
				opacity: 0;
				transform: scale(0.92) translateY(10px);
			}

			to {
				opacity: 1;
				transform: scale(1) translateY(0);
			}
		}
	</style>

	<script type="module">
		import * as nue from "../nue.js"

		class Root extends nue.Root {
			constructor () {
				super()

				this.popup = new nue.Popup()
				this.popup.hide()
				this.add(this.popup)

				for (let i = 0; i < 5; i++) {
					let picFrame = new nue.PictureFrame()
					let src = `./slide-show/${i}.png`
					picFrame.setImage(src)
					picFrame.setTitle(src)
					this.add(picFrame)
				}
			}

			receive (key, val) {
				switch (key) {
				case 'pictureFrameImageClicked': {
					let img = new nue.Img()
					img.setAttr('src', val.src)
					this.popup.clear()
					this.popup.add(img)
					this.popup.show()
				} break
				}
			}
		}

		document.addEventListener('DOMContentLoaded', () => {
			let root = new Root()
			root.mount('#app')
		})
	</script>
</head>
<body>
	<div id="app"></div>
</body>
</html>
